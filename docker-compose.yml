services:
  db:
    image: postgres:16-alpine
    container_name: fieldpulse-db
    environment:
      POSTGRES_DB: fieldpulse
      POSTGRES_USER: fieldpulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - fieldpulse-pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  fieldpulse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fieldpulse-marketing
    ports:
      - "80:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fieldpulse:${POSTGRES_PASSWORD}@db:5432/fieldpulse?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  fieldpulse-pgdata:
    driver: local
