services:
  fieldpulse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fieldpulse-marketing
    ports:
      - "3000:3000"
    volumes:
      - fieldpulse-data:/app/data
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - NODE_ENV=production
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  fieldpulse-data:
    driver: local
